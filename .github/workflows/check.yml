name: check

on:
  push:
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # CPU profile: torch/onnxruntime CPU builds. The upper version tracks the
        # availability of CPU wheels for torch/onnxruntime (add 3.14 once wheels ship).
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # CPU profile + dev tooling (torch/onnxruntime/pytest are moved into extras,
      # see pyproject F55). A bare `uv sync` won't install them and would pull torch
      # past the pin index — so --extra cpu --extra dev are mandatory.
      - name: Quality gate (ruff + mypy + pytest, CPU profile)
        run: uv run --python ${{ matrix.python }} --extra cpu --extra dev python scripts/check.py
